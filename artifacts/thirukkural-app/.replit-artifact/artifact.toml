kind = "mobile"
previewPath = "/"
title = "Thirukkural App"
version = "1.0.0"
id = "artifacts/thirukkural-app"
router = "expo-domain"

[[integratedSkills]]
name = "expo"
version = "1.0.0"

[[services]]
ensurePreviewReachable = "/status"
name = "expo"
paths = [ "/" ]
localPort = 21621

[services.development]
run = "pnpm --filter @workspace/thirukkural-app run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/thirukkural-app", "run", "build" ]
run = [ "pnpm", "--filter", "@workspace/thirukkural-app", "run", "serve" ]

[services.env]
PORT = "21621"
BASE_PATH = "/"
